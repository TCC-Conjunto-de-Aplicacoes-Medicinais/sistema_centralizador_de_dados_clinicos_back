      cpf:
        type: string
      created_at:
        type: string
      createdAt:
        type: string
      deleted_at:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      emails:
        items:
          $ref: '#/definitions/database.PatientEmail'
        type: array
      emergency_contact:
        type: string
      exams:
        items:
          $ref: '#/definitions/database.Exam'
        type: array
