    type: object
  models.AIAnalysisRequest:
    properties:
      query:
        type: string
    required:
    - query
    type: object
  models.AIAnalysisResponse:
    properties:
      analysis:
        type: string
      disclaimer:
        type: string
    type: object
  models.AddressRequest:
    properties:
      address:
        type: string
      principal:
        type: boolean
    required:
    - address
    type: object
  models.Device:
    properties:
      device_name:
        type: string
      public_key:
        type: string
    required:
    - device_name
    - public_key
    type: object
  models.EmailRequest:
    properties:
      email:
        type: string
      principal:
        type: boolean
    required:
    - email
    type: object
  models.LoginRequest:
    properties:
      cpf:
        type: string
      password:
        minLength: 8
        type: string
    required:
