    - password
    type: object
  models.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  models.PhoneRequest:
    properties:
      phone:
        type: string
      principal:
        type: boolean
    required:
    - phone
    type: object
  models.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  models.ShareExamRequest:
    properties:
      doctor_name:
        type: string
      exam_id:
        type: string
    required:
    - doctor_name
    - exam_id
    type: object
  models.SignupRequest:
    properties:
      cpf:
        type: string
      device:
        $ref: '#/definitions/models.Device'
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - cpf
    - device
    - email
    - name
    - password
    type: object
  models.UpdateUserRequest:
    properties:
      addresses:
        items:
          $ref: '#/definitions/models.AddressRequest'
        type: array
      emails:
        items:
          $ref: '#/definitions/models.EmailRequest'
        type: array
      emergency_contact:
        type: string
      name:
        type: string
      phones:
        items:
          $ref: '#/definitions/models.PhoneRequest'
        type: array
    type: object
  services.UserProfileResponse:
    properties:
      address:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
host: api.pohinc.com.br
info:
  contact: {}
  description: API para gerenciamento de pacientes e dispositivos via Keycloak e polyglot
    persistence.
  title: Sistema Centralizador de Dados Clínicos API
  version: "1.0"
paths:
  /api/ai/analyze:
    post:
      consumes:
      - application/json
      description: Envia um texto descrevendo exames ou sintomas e recebe uma análise
        gerada por IA (segunda opinião)
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Texto da consulta do paciente
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AIAnalysisRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AIAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Análise de Exames por IA
      tags:
      - ai
  /api/exams:
    get:
      description: Retorna todos os exames ativos do paciente logado
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/database.Exam'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar Exames do Paciente
      tags:
      - exams
    post:
      consumes:
      - multipart/form-data
      description: Faz o upload de um arquivo de exame e salva os metadados no banco
      parameters:
      - description: Arquivo do exame
        in: formData
        name: file
        required: true
        type: file
      - description: Data do exame (YYYY-MM-DD ou formato RFC3339)
        in: formData
        name: date
        required: true
        type: string
      - description: Tipo de exame
        in: formData
        name: exam_type
        required: true
        type: string
      - description: Instituição
        in: formData
        name: institution
        type: string
      - description: Resultado do exame
        in: formData
        name: exam_result
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload de Exame
      tags:
      - exams
  /api/exams/{id}:
    get:
      description: Retorna as informações de um exame específico do paciente logado
      parameters:
      - description: ID do Exame
        in: path
        name: id
        required: true
        type: string
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/database.Exam'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obter Detalhes do Exame
      tags:
      - exams
  /api/exams/file/{id}/{filename}:
    get:
      description: Obtém o stream do arquivo de exame armazenado no MinIO exigindo
        DPoP proof no header
      parameters:
      - description: ID do Exame
        in: path
        name: id
        required: true
        type: string
      - description: Nome do Arquivo
        in: path
        name: filename
        required: true
        type: string
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obter Stream do Arquivo de Exame com DPoP
      tags:
      - exams
  /api/login:
    post:
      consumes:
      - application/json
      description: Autentica um paciente via Keycloak exigindo DPoP proof (RFC 9449)
        no header
      parameters:
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Credenciais do paciente
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login de Paciente com DPoP
      tags:
      - auth
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Emite um novo token usando um RefreshToken via Keycloak exigindo
        DPoP proof no header
      parameters:
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Token de refresh
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Atualização de Access Token
      tags:
      - auth
  /api/signup:
    post:
      consumes:
      - application/json
      description: Cadastra um paciente integrando Keycloak, MariaDB e Cassandra
      parameters:
      - description: Dados do paciente e dispositivo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cadastro de Paciente
      tags:
      - users
  /api/users:
    put:
      consumes:
      - application/json
      description: Atualiza dados do usuário (nome, telefone, endereço) no MariaDB
        e Keycloak
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Dados para atualização
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Atualização de Usuário
      tags:
      - users
  /api/users/exams/share:
    post:
      consumes:
      - application/json
      description: Mock de compartilhamento de exame que gera um log no Cassandra
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Dados para compartilhamento
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ShareExamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compartilhar Exame
      tags:
      - exams
  /api/users/profile:
    get:
      description: Retorna os dados editáveis do perfil do paciente (nome, telefone,
        endereço)
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.UserProfileResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Perfil do Usuário
      tags:
      - users
  /api/users/send-verify-email:
    post:
      description: Solicita ao Keycloak o envio de um e-mail de verificação para o
        usuário
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Enviar E-mail de Verificação
      tags:
      - auth
  /api/users/verify-email-code:
    post:
      consumes:
      - application/json
      description: Valida o código de verificação enviado por e-mail
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Código de verificação
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.VerifyCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Validar E-mail
      tags:
      - auth
swagger: "2.0"
