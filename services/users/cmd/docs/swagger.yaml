host: api.pohinc.com.br
info:
  contact: {}
  description: API para gerenciamento de pacientes e dispositivos via Keycloak e polyglot
    persistence.
  title: Sistema Centralizador de Dados Clínicos API
  version: "1.0"
paths:
  /api/login:
    post:
      consumes:
      - application/json
      description: Autentica um paciente via Keycloak exigindo DPoP proof (RFC 9449)
        no header
      parameters:
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Credenciais do paciente
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login de Paciente com DPoP
      tags:
      - auth
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Emite um novo token usando um RefreshToken via Keycloak exigindo
        DPoP proof no header
      parameters:
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Token de refresh
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Atualização de Access Token
      tags:
      - auth
  /api/signup:
    post:
      consumes:
      - application/json
      description: Cadastra um paciente integrando Keycloak, MariaDB e Cassandra
      parameters:
      - description: Dados do paciente e dispositivo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cadastro de Paciente
      tags:
      - users
  /api/users:
    put:
      consumes:
      - application/json
      description: Atualiza dados do usuário (nome, telefone, endereço) no MariaDB
        e Keycloak
      parameters:
      - description: Access Token (Bearer)
        in: header
        name: Authorization
        required: true
        type: string
      - description: DPoP Proof JWT (RFC 9449)
        in: header
        name: DPoP
        required: true
        type: string
      - description: Dados para atualização
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_TCC-Conjunto-de-Aplicacoes-Medicinais_sistema_centralizador_de_dados_clinicos_back_shared_models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Atualização de Usuário
      tags:
      - users
  /api/users/{id}/send-verify-email:
    post:
      description: Solicita ao Keycloak o envio de um e-mail de verificação para o
        usuário
      parameters:
      - description: ID do Usuário
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Enviar E-mail de Verificação
      tags:
      - auth
swagger: "2.0"
