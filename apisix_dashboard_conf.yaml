conf:
  listen:
    host: 0.0.0.0
    port: 9000
  allow_list:
    - 0.0.0.0/0

  etcd:
    endpoints:
      - etcd_server:2379
    prefix: "/apisix"
    
authentication:
  secret: "secret-key-that-should-be-changed-in-production"
  expire_time: 3600
  users:
    - username: admin
      password: admin
